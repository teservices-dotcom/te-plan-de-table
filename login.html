<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion | T&E plan de table</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--bg-light);min-height:100vh;display:flex;flex-direction:column}
.auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-box{background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);border:1px solid var(--border-warm);width:100%;max-width:440px;overflow:hidden}
.auth-header{background:var(--primary);padding:2rem;text-align:center;color:#fff}
.auth-header .logo-icon{width:52px;height:52px;background:rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;font-weight:800}
.auth-header h1{font-size:1.2rem;font-weight:800;margin-bottom:.25rem}
.auth-header p{font-size:.85rem;opacity:.85}
.auth-body{padding:2rem}
.auth-tabs{display:flex;gap:0;margin-bottom:1.75rem;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.auth-tab{flex:1;padding:.65rem;text-align:center;font-size:.875rem;font-weight:600;cursor:pointer;color:var(--text-muted);background:#fff;transition:all .2s;border:none}
.auth-tab.active{background:var(--primary);color:#fff}
.auth-footer{text-align:center;padding:1rem 2rem 1.5rem;font-size:.8rem;color:var(--text-muted)}
.auth-footer a{color:var(--primary);font-weight:600}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--text-light);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="logo-icon">T</div>
    T&E plan de table
  </a>
  <div class="navbar-nav">
    <a href="index.html">← Retour au site</a>
  </div>
</nav>

<div class="auth-page" style="padding-top:80px">
  <div class="auth-box">
    <div class="auth-header">
      <div class="logo-icon">🍽️</div>
      <h1>T&E plan de table</h1>
      <p>Gérez vos événements en toute sérénité</p>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Se connecter</button>
        <button class="auth-tab" onclick="showTab('register')">Créer un compte</button>
      </div>

      <!-- LOGIN -->
      <div id="tab-login">
        <div id="login-alert"></div>
        <div class="form-group">
          <label>Adresse email</label>
          <input type="email" id="login-email" placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="login()" id="login-btn">
          Se connecter
        </button>
        <div class="divider">ou</div>
        <button class="btn btn-ghost btn-full" onclick="showTab('register')">
          Créer un compte gratuit
        </button>
      </div>

      <!-- REGISTER -->
      <div id="tab-register" style="display:none">
        <div id="register-alert"></div>
        <div class="form-group">
          <label>Prénom & Nom</label>
          <input type="text" id="reg-name" placeholder="Marie Dupont">
        </div>
        <div class="form-group">
          <label>Adresse email</label>
          <input type="email" id="reg-email" placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="reg-password" placeholder="Minimum 6 caractères">
          <div class="form-hint">Au moins 6 caractères</div>
        </div>
        <div class="form-group">
          <label>Rôle</label>
          <select id="reg-role">
            <option value="admin">Administrateur (organisateur)</option>
            <option value="user">Invité</option>
          </select>
          <div class="form-hint">Choisissez "Administrateur" si vous organisez des événements</div>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="register()" id="register-btn">
          Créer mon compte
        </button>
      </div>
    </div>
    <div class="auth-footer">
      En vous connectant, vous acceptez nos <a href="#">CGU</a> et notre <a href="#">politique de confidentialité</a>
    </div>
  </div>
</div>

<script type="module">
import { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, doc, setDoc, getDoc } from './firebase.js';

window.showTab = function(tab) {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    const role = snap.exists() ? snap.data().role : 'user';
    window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
  }
});

window.login = async function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const alert = document.getElementById('login-alert');
  alert.innerHTML = '';
  if (!email || !password) { alert.innerHTML = '<div class="alert alert-error">Veuillez remplir tous les champs.</div>'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    alert.innerHTML = `<div class="alert alert-error">${getFrenchError(e.code)}</div>`;
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

window.register = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;
  const btn = document.getElementById('register-btn');
  const alert = document.getElementById('register-alert');
  alert.innerHTML = '';
  if (!name || !email || !password) { alert.innerHTML = '<div class="alert alert-error">Veuillez remplir tous les champs.</div>'; return; }
  btn.disabled = true; btn.textContent = 'Création…';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), { name, email, role, createdAt: new Date().toISOString() });
    window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
  } catch(e) {
    alert.innerHTML = `<div class="alert alert-error">${getFrenchError(e.code)}</div>`;
    btn.disabled = false; btn.textContent = 'Créer mon compte';
  }
}

function getFrenchError(code) {
  const errors = {
    'auth/invalid-email': 'Adresse email invalide.',
    'auth/user-not-found': 'Aucun compte avec cet email.',
    'auth/wrong-password': 'Mot de passe incorrect.',
    'auth/email-already-in-use': 'Cet email est déjà utilisé.',
    'auth/weak-password': 'Le mot de passe doit faire au moins 6 caractères.',
    'auth/invalid-credential': 'Email ou mot de passe incorrect.',
  };
  return errors[code] || 'Une erreur est survenue. Réessayez.';
}
</script>
</body>
</html>
